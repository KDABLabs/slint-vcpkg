name: build

on:
  push:
  pull_request:

jobs:
  offline-default-features:
    name: ${{ matrix.os }} (offline, default features)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux windowing dev packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libx11-dev \
            libxrandr-dev libxi-dev libxcursor-dev libgl1-mesa-dev libegl1-mesa-dev \
            libfontconfig1-dev

      - name: Clone vcpkg
        run: git clone --depth 1 https://github.com/microsoft/vcpkg.git ../vcpkg-tool

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            ../vcpkg-tool/bootstrap-vcpkg.bat
          else
            ../vcpkg-tool/bootstrap-vcpkg.sh
          fi

      - uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg/archives
          key: vcpkg-binarycache-${{ runner.os }}-${{ hashFiles('ports/**') }}
          restore-keys: |
            vcpkg-binarycache-${{ runner.os }}-

      # Corrosion needs no network at all. This is a smoke test in its own right.
      - name: Install corrosion (must succeed with zero network access)
        shell: bash
        run: |
          ../vcpkg-tool/vcpkg install corrosion --overlay-ports=./ports

      # Slint's build should be able to run fully offline once the vendored-crates
      # archive is downloaded. Block network access for the actual install to prove
      # the vendoring pipeline works rather than silently falling back to a live
      # network fetch of crates.io.
      # VCPKG_KEEP_ENV_VARS=PATH: on Windows, vcpkg builds ports in a curated
      # environment and does NOT propagate the calling process's PATH by default --
      # without this, portfile.cmake's find_program(cargo) preflight can't see the
      # Rust toolchain dtolnay/rust-toolchain just put on PATH. Harmless elsewhere.
      - name: Install slint (default features, network blocked after downloads)
        shell: bash
        env:
          CARGO_NET_OFFLINE: "true"
          VCPKG_KEEP_ENV_VARS: "PATH"
        run: |
          ../vcpkg-tool/vcpkg install slint --overlay-ports=./ports

      # The smoketest needs the `experimental` feature too (for slint::testing::init(),
      # which lets it run with no display server -- see below). --recurse layers it
      # onto the already-installed default-features build from the step above rather
      # than replacing it, so that step still validates the true default feature set
      # offline; this one is purely prep for the smoketest run.
      - name: Add experimental feature for the smoketest's testing backend
        shell: bash
        env:
          CARGO_NET_OFFLINE: "true"
          VCPKG_KEEP_ENV_VARS: "PATH"
        run: |
          ../vcpkg-tool/vcpkg install "slint[core,testing,experimental]" --overlay-ports=./ports --recurse

      # Proves the installed package is a working library, not just something that
      # configured/compiled/linked. Uses slint::testing::init() (see main.cpp) so it
      # needs no display server -- without it, even instantiating a Window component
      # tries to initialize a real windowing backend (winit) and aborts on a runner
      # with no X11/Wayland session (this is what broke the first CI run).
      # test/smoketest also has its own vcpkg.json/vcpkg-configuration.json (for the
      # separate registry-consumption job below) -- force classic mode here so this
      # reuses the overlay-ports install above instead of re-resolving from the real
      # registry over the network.
      # CMAKE_TOOLCHAIN_FILE must be absolute: CMake resolves a relative
      # toolchain-file path against the *build* directory (test/smoketest/build),
      # not the invocation cwd, so a relative "../vcpkg-tool/..." silently resolved
      # to the wrong place.
      - name: Build and run the smoketest against the installed package
        shell: bash
        run: |
          cmake -S test/smoketest -B test/smoketest/build \
            -DCMAKE_TOOLCHAIN_FILE="$(pwd)/../vcpkg-tool/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_MANIFEST_MODE=OFF
          cmake --build test/smoketest/build --config Release
          # find -exec does NOT propagate the executed command's exit status as find's
          # own exit status (a real bug that let the smoketest abort with SIGABRT while
          # this step still reported success) -- so find the binary, then run it
          # directly and let its exit code fail the step for real.
          smoketest_bin="$(find test/smoketest/build -type f \
            \( -name 'slint_vcpkg_smoketest' -o -name 'slint_vcpkg_smoketest.exe' \) -print -quit)"
          if [[ -z "${smoketest_bin}" ]]; then
            echo "error: smoketest binary not found under test/smoketest/build" >&2
            exit 1
          fi
          "${smoketest_bin}"

  # Resolves slint/corrosion from the *published* git registry (this repo, at whatever
  # commit test/smoketest/vcpkg-configuration.json currently pins), not overlay-ports.
  # This is the real "does consuming this registry actually work" check; unlike the
  # job above it needs network access to clone the registry, and it only exercises
  # whatever is already pushed -- it won't reflect in-progress portfile changes on a
  # PR branch until they're merged and the pinned commit is bumped.
  registry-consumption:
    name: registry consumption (manifest mode, from GitHub)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libx11-dev \
            libxrandr-dev libxi-dev libxcursor-dev libgl1-mesa-dev libegl1-mesa-dev \
            libfontconfig1-dev
      - run: git clone --depth 1 https://github.com/microsoft/vcpkg.git ../vcpkg-tool
      - run: ../vcpkg-tool/bootstrap-vcpkg.sh
      - uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg/archives
          key: vcpkg-binarycache-${{ runner.os }}-${{ hashFiles('ports/**') }}
          restore-keys: |
            vcpkg-binarycache-${{ runner.os }}-
      - name: Configure and build via the real registry
        env:
          VCPKG_KEEP_ENV_VARS: "PATH"
        run: |
          cmake -S test/smoketest -B test/smoketest/build \
            -DCMAKE_TOOLCHAIN_FILE="$(pwd)/../vcpkg-tool/scripts/buildsystems/vcpkg.cmake"
          cmake --build test/smoketest/build
          test/smoketest/build/slint_vcpkg_smoketest

  # Opt-in features not yet verified to work fully offline (renderer-skia, backend-qt,
  # gettext -- see README's "Known limitations"). Kept separate so a failure here
  # doesn't block the core matrix above. Network is left enabled.
  opt-in-features:
    name: opt-in features (network allowed, best-effort)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libx11-dev \
            libxrandr-dev libxi-dev libxcursor-dev libgl1-mesa-dev libegl1-mesa-dev \
            libfontconfig1-dev
      - run: git clone --depth 1 https://github.com/microsoft/vcpkg.git ../vcpkg-tool
      - run: ../vcpkg-tool/bootstrap-vcpkg.sh
      - run: ../vcpkg-tool/vcpkg install "slint[renderer-skia]" --overlay-ports=./ports
